name: Build and Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.release.outputs.tag_name }}

    steps:
      - uses: actions/checkout@v6

      - name: Create version-matched release
        id: release
        env:
          GH_TOKEN: ${{ secrets.PAT || github.token }}
        run: |
          version="$(node -p "require('./package.json').version")"
          tag_name="v$version"
          echo "tag_name=$tag_name" >> "$GITHUB_OUTPUT"

          if ! gh release view "$tag_name" >/dev/null 2>&1; then
            gh release create "$tag_name" --target "$GITHUB_SHA" --title "$tag_name" --generate-notes
          fi

  build-and-deploy:
    needs: release
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Each font variant is published to its own gh-pages branch.
        font:
          - { key: all, suffix: '' }
          - { key: cdn, suffix: '-cdn-fonts' }
          - { key: firasans, suffix: '-firasans-only' }
          - { key: misans, suffix: '-misans-only' }
          - { key: pingfang, suffix: '-pingfang-only' }
          - { key: sarasa, suffix: '-sarasa-only' }
          - { key: none, suffix: '-no-fonts' }
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
      - uses: pnpm/action-setup@v6

      - name: Install and Build 🔧
        env:
          FONT: ${{ matrix.font.key }}
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Deploy 🚀
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.PAT }}
          publish_dir: ./dist
          publish_branch: gh-pages${{ matrix.font.suffix }}
          force_orphan: true

  release-dist:
    needs: release
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        font:
          - { key: all, suffix: '' }
          - { key: cdn, suffix: '-cdn-fonts' }
          - { key: firasans, suffix: '-firasans-only' }
          - { key: misans, suffix: '-misans-only' }
          - { key: pingfang, suffix: '-pingfang-only' }
          - { key: sarasa, suffix: '-sarasa-only' }
          - { key: none, suffix: '-no-fonts' }
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
      - uses: pnpm/action-setup@v6

      - name: Build and Zip the dist folder
        env:
          FONT: ${{ matrix.font.key }}
        run: |
          pnpm install --frozen-lockfile
          pnpm run build
          zip -r dist${{ matrix.font.suffix }}.zip dist

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.PAT || github.token }}
        run: |
          gh release upload "${{ needs.release.outputs.tag_name }}" \
            "dist${{ matrix.font.suffix }}.zip" --clobber

  release-image:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: set up docker buildx
        uses: docker/setup-buildx-action@v4
        id: buildx

      - name: login to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.PAT }}

      - name: build and publish ghcr.io docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          builder: ${{ steps.buildx.outputs.name }}
          file: Dockerfile
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ needs.release.outputs.tag_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
